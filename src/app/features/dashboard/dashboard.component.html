<div class="dashboard">
  <div class="stats-row d-flex gap-4">
    <mat-card class="stat-card">
      <mat-card-title>Total Leaves</mat-card-title>
      <mat-card-content>
        <div class="stat-value">{{ totals.total }}</div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-title>Leave Taken</mat-card-title>
      <mat-card-content>
        <div class="stat-value">{{ totals.taken }}</div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-title>Pending</mat-card-title>
      <mat-card-content>
        <div class="stat-value">{{ totals.pending }}</div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="table-container">
    <h2>Leave Requests</h2>

    <table mat-table [dataSource]="leaveRequests" class="mat-elevation-z8">
      <!-- Requester -->
      <ng-container matColumnDef="requester">
        <th mat-header-cell *matHeaderCellDef>Requester</th>
        <td mat-cell *matCellDef="let row">{{ row.requester }}</td>
      </ng-container>

      <!-- Type -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let row">{{ row.type }}</td>
      </ng-container>

      <!-- Dates -->
      <ng-container matColumnDef="dates">
        <th mat-header-cell *matHeaderCellDef>Dates</th>
        <td mat-cell *matCellDef="let row">
          {{ row.start | date: "mediumDate" }}
          {{ row.end | date: "mediumDate" }}
        </td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip-set>
            <mat-chip [ngClass]="row.status.toLowerCase()">
              {{ row.status }}
            </mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <!-- Actions -->
      <!-- <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" aria-label="View">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container> -->

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
