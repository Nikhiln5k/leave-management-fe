<table>
  <tr>
    <th>Name</th>
    <th>Type</th>
    <th>Dates</th>
    <th>Action</th>
  </tr>

  @for (leave of leaves(); track leave.id) {
    <tr>
      <td>{{ leave.employeeName }}</td>
      <td>{{ leave.type }}</td>
      <td>{{ leave.from }} - {{ leave.to }}</td>
      <td>
        <button>Action</button>
      </td>
    </tr>
  } @empty {
    <tr><td colspan="4">No requests</td></tr>
  }
</table>
